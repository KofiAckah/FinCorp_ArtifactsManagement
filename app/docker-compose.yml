services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fincorp
      POSTGRES_USER: fincorp_user
      POSTGRES_PASSWORD: fincorp_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fincorp_user -d fincorp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fincorp
      DB_USER: fincorp_user
      DB_PASSWORD: fincorp_pass
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
